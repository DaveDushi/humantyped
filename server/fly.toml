app = "humantyped"
primary_region = "iad"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "humantyped_data"
  destination = "/app/data"

[env]
  DATABASE_PATH = "/app/data/humantyped.db"
